[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Regenerates the HARTI weekly Passion Fruit + Moringa analysis every Monday
# at 02:30 UTC (08:00 Sri Lanka time) - matches the "Next scheduled analysis:
# Monday 08:00 AM" text shown on the HARTI Market Intelligence page.
# See netlify/functions/harti-weekly-cron.ts.
[functions."harti-weekly-cron"]
  schedule = "30 2 * * 1"
